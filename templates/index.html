<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Secure Login</title>
    <link rel="stylesheet" href="{{ url_for("static", filename="style.css") }}">
</head>
<body>
<div class="container">
    <h1>🔑Bank Login</h1>
    
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}{% for cat, msg in messages %}<div class="flash {{cat}}">{{msg}}</div>{% endfor %}{% endif %}
    {% endwith %}

    <form action="/login" method="post">
        <div class="form-group">
            <input type="text" name="account" placeholder="Account Number" required>
        </div>
        <div class="form-group">
            <input type="password" name="password" placeholder="Password" required>
        </div>
        <button type="submit">Sign In</button>
    </form>
    <div class="nav-links"><a href="/register">Open an Account</a></div>
</div>
</body>
</html>
