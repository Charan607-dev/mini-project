<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Wire Transfer</title>
    <link rel="stylesheet" href="{{ url_for("static", filename="style.css") }}">
</head>
<body>
<div class="container">
    <h1>Transfer Money</h1>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}{% for cat, msg in messages %}<div class="flash {{cat}}">{{msg}}</div>{% endfor %}{% endif %}
    {% endwith %}

    <form method="post">
        <div class="form-group">
            <label>Recipient Account Number</label>
            <input type="text" name="receiver" required>
        </div>
        <div class="form-group">
            <label>Amount ($)</label>
            <input type="number" name="amount" min="500" step="500" required>
        </div>
        <button type="submit">Execute Transfer</button>
    </form>
    <div class="nav-links"><a href="/dashboard">↩ Back to Dashboard</a></div>
</div>
</body>
</html>
