<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>🆕Open New Account</title>
    <link rel="stylesheet" href="{{ url_for("static", filename="style.css") }}">
</head>
<body>
<div class="container">
    <h1>🆕Create Account</h1>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}{% for cat, msg in messages %}<div class="flash {{cat}}">{{msg}}</div>{% endfor %}{% endif %}
    {% endwith %}

   <form method="post">
    <div class="form-group">
        <input type="text" name="name" placeholder="Full Name" required>
    </div>

    <div class="form-group">
        <input type="password" name="password" placeholder="Secure Password" required>
    </div>

    <div class="form-group">
        <input type="number" name="balance" placeholder="Opening Balance ($)" min="0" step="0.01" required>
    </div>

    <button type="submit">Register Account</button>
</form>
    <div class="nav-links"><a href="/">Back to Login</a></div>
</div>
</body>
</html>
